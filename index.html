<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operation Morse</title>
    <style>
        :root {
            --bg-color: #121214;
            --card-bg: #1e1e24;
            --text-color: #f5f5f7;
            --accent-color: #00adb5;
            --border-color: #393e46;
            --whatsapp-color: #25D366;
            --mnemonic-bg: #2a2a35;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 700px;
        }

        h1 {
            text-align: center;
            color: var(--accent-color);
            margin-top: 0;
            font-size: 2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        p.subtitle {
            text-align: center;
            color: #8a8a93;
            margin-bottom: 30px;
            font-size: 0.95rem;
        }

        .translator-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .box {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #b2b2b8;
        }

        textarea {
            background-color: var(--bg-color);
            color: var(--text-color);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            font-size: 1.1rem;
            resize: vertical;
            min-height: 100px;
            transition: border-color 0.2s;
        }

        textarea:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .morse-input {
            font-family: 'Courier New', Courier, monospace;
            letter-spacing: 2px;
        }

        .whatsapp-btn {
            background-color: var(--whatsapp-color);
            color: #ffffff;
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            transition: background-color 0.2s, transform 0.1s;
            text-decoration: none;
            margin-top: 5px;
        }

        .whatsapp-btn:hover {
            background-color: #20ba5a;
        }

        .whatsapp-btn:active {
            transform: scale(0.98);
        }

        .instructions {
            margin-top: 20px;
            background-color: rgba(57, 62, 70, 0.3);
            padding: 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            color: #a0a0a8;
            line-height: 1.4;
        }

        /* Chart Section Styling */
        .chart-heading {
            margin-top: 40px;
            margin-bottom: 15px;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent-color);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 5px;
        }

        .mnemonic-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 12px;
            margin-top: 15px;
        }

        .mnemonic-card {
            background-color: var(--mnemonic-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px;
            text-align: center;
            transition: transform 0.2s, border-color 0.2s;
        }

        .mnemonic-card:hover {
            transform: translateY(-2px);
            border-color: var(--accent-color);
        }

        .letter-display {
            font-size: 1.6rem;
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 4px;
        }

        .code-display {
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.95rem;
            color: var(--accent-color);
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>• — Operation Morse — •</h1>
    <p class="subtitle">Real-time Text & Morse Code Converter</p>

    <div class="translator-section">
        <div class="box">
            <label for="textInput">Plain Text</label>
            <textarea id="textInput" placeholder="Type your message here..."></textarea>
        </div>

        <div class="box">
            <label for="morseInput">Morse Code</label>
            <textarea id="morseInput" class="morse-input" placeholder="... --- ..."></textarea>
            
            <button id="whatsappBtn" class="whatsapp-btn">
                Send Morse on WhatsApp
            </button>
        </div>
    </div>

    <div class="instructions">
        <strong>Survival Tip:</strong> Separate individual Morse letters with a single space. Use a forward slash (<code>/</code>) between completed words.
    </div>

    <h2 class="chart-heading">Mnemonic Reference Library</h2>
    <div class="mnemonic-grid" id="mnemonicGrid">
        </div>
</div>
